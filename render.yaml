services:
  - type: web
    name: vacantrix-telegram-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      # service_role-ключ: бот — доверенный бэкенд, серверные операции с users
      # идут под ним (обходит RLS). ОБЯЗАТЕЛЕН после применения
      # migrations/migrate_lock_bot_tables.py.
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: INSTRUCTION_URL
        sync: false
